services:
  pgvector-edtechrag:
    image: pgvector/pgvector:pg18
    container_name: pgvector-edtechrag-container

    restart: unless-stopped
    # networks:
      # - postgresql_net
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: mypgdb
    volumes:
      - ./pgdata:/var/lib/postgresql  # PostgreSQL-Datenbank wird im Host-Ordner ./pgdata gespeichert
    ports:
      - 5432:5432

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-edtechrag-container
    restart: unless-stopped
    depends_on:
      - pgvector-edtechrag
      - traefik_net

    environment:
      PGADMIN_DEFAULT_EMAIL: dev@ed-tech.at
      PGADMIN_DEFAULT_PASSWORD: adminPass
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    ports:
      - 8080:80

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.edtechrag.local`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=myresolver"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"

# networks:
#   postgresql_net:
#     external: true
#   traefik_net:
#     external: true

